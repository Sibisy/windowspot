name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish src/WindowSpot/WindowSpot.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path publish/WindowSpot.exe -DestinationPath WindowSpot-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/WindowSpot.exe
            WindowSpot-win-x64.zip
          generate_release_notes: true
